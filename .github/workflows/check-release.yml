name: Check for new claude-code release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest npm version
        id: npm
        run: |
          LATEST=$(npm view @anthropic-ai/claude-code version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep -oP 'CLAUDE_CODE_VERSION=\K[^\s]+' Dockerfile)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.npm.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "s/CLAUDE_CODE_VERSION=.*/CLAUDE_CODE_VERSION=${{ steps.npm.outputs.version }}/" Dockerfile

      - name: Commit, tag, and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.npm.outputs.version }}"

          # Create a signed commit via the GitHub API
          BLOB_SHA=$(gh api repos/${{ github.repository }}/git/blobs \
            -f content="$(base64 -w0 Dockerfile)" \
            -f encoding=base64 \
            --jq '.sha')

          TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
            -f base_tree="$(git rev-parse HEAD^{tree})" \
            -f 'tree[][path]=Dockerfile' \
            -f 'tree[][mode]=100644' \
            -f 'tree[][type]=blob' \
            -f "tree[][sha]=$BLOB_SHA" \
            --jq '.sha')

          COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
            -f message="Update claude-code to v${VERSION}" \
            -f "tree=$TREE_SHA" \
            -f "parents[]=$(git rev-parse HEAD)" \
            --jq '.sha')

          # Update the branch ref
          gh api repos/${{ github.repository }}/git/refs/heads/main \
            -X PATCH -f sha="$COMMIT_SHA"

          # Create a signed annotated tag via the GitHub API
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
            -f "tag=v${VERSION}" \
            -f "message=v${VERSION}" \
            -f "object=$COMMIT_SHA" \
            -f type=commit \
            --jq '.sha')

          gh api repos/${{ github.repository }}/git/refs \
            -f "ref=refs/tags/v${VERSION}" \
            -f "sha=$TAG_SHA"

          # Discard the local sed change and pull the API-created commit
          git checkout -- Dockerfile
          git pull --ff-only

          gh release create "v${VERSION}" --title "v${VERSION}" --notes "Update claude-code to v${VERSION}"

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.npm.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

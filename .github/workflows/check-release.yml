name: Check for new claude-code release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest npm version
        id: npm
        run: |
          LATEST=$(npm view @anthropic-ai/claude-code version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep -oP 'CLAUDE_CODE_VERSION=\K[^\s]+' Dockerfile)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [ "${{ steps.npm.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update Dockerfile
        if: steps.check.outputs.skip == 'false'
        run: |
          sed -i "s/CLAUDE_CODE_VERSION=.*/CLAUDE_CODE_VERSION=${{ steps.npm.outputs.version }}/" Dockerfile

      - name: Commit, tag, and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.npm.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "Update claude-code to v${VERSION}"
          git tag "v${VERSION}"
          git push
          git push --tags
          gh release create "v${VERSION}" --title "v${VERSION}" --notes "Update claude-code to v${VERSION}"

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.check.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: steps.check.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.npm.outputs.version }}
            ghcr.io/${{ github.repository }}:latest

name: Check for new claude-code release

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      target_version: ${{ steps.target.outputs.version }}
      update_dockerfile: ${{ steps.check.outputs.update_dockerfile }}
      tag_exists: ${{ steps.tag.outputs.exists }}
      release_exists: ${{ steps.release.outputs.exists }}
      image_exists: ${{ steps.image.outputs.exists }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get latest npm version
        id: npm
        run: |
          LATEST=$(npm view @anthropic-ai/claude-code version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current version from Dockerfile
        id: current
        run: |
          CURRENT=$(grep -oP 'CLAUDE_CODE_VERSION=\K[^\s]+' Dockerfile)
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Check if Dockerfile update needed
        id: check
        run: |
          if [ "${{ steps.npm.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "update_dockerfile=false" >> "$GITHUB_OUTPUT"
          else
            echo "update_dockerfile=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine target version
        id: target
        run: |
          if [ "${{ steps.check.outputs.update_dockerfile }}" = "true" ]; then
            echo "version=${{ steps.npm.outputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.current.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag exists
        id: tag
        run: |
          VERSION="${{ steps.target.outputs.version }}"
          if git tag -l "v${VERSION}" | grep -q "v${VERSION}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release exists
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.target.outputs.version }}"
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if Docker image exists
        id: image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.target.outputs.version }}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if gh api "users/${REPO_LOWER%%/*}/packages/container/${REPO_LOWER##*/}/versions" \
              --paginate --jq '.[].metadata.container.tags[]' 2>/dev/null \
              | grep -qx "v${VERSION}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  commit-and-tag:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.update_dockerfile == 'true' || needs.check.outputs.tag_exists == 'false'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Commit and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check.outputs.target_version }}"

          if [ "${{ needs.check.outputs.update_dockerfile }}" = "true" ]; then
            sed -i "s/CLAUDE_CODE_VERSION=.*/CLAUDE_CODE_VERSION=${VERSION}/" Dockerfile

            # Create a signed commit via the GitHub API with updated Dockerfile
            BLOB_SHA=$(gh api repos/${{ github.repository }}/git/blobs \
              -f content="$(base64 -w0 Dockerfile)" \
              -f encoding=base64 \
              --jq '.sha')

            TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
              -f base_tree="$(git rev-parse HEAD^{tree})" \
              -f 'tree[][path]=Dockerfile' \
              -f 'tree[][mode]=100644' \
              -f 'tree[][type]=blob' \
              -f "tree[][sha]=$BLOB_SHA" \
              --jq '.sha')

            COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
              -f message="Update claude-code to v${VERSION}" \
              -f "tree=$TREE_SHA" \
              -f "parents[]=$(git rev-parse HEAD)" \
              --jq '.sha')

            # Update the branch ref
            gh api repos/${{ github.repository }}/git/refs/heads/main \
              -X PATCH -f sha="$COMMIT_SHA"
          else
            # No Dockerfile change; tag the current HEAD
            COMMIT_SHA=$(git rev-parse HEAD)
          fi

          if [ "${{ needs.check.outputs.tag_exists }}" = "false" ]; then
            # Create a signed annotated tag via the GitHub API
            TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
              -f "tag=v${VERSION}" \
              -f "message=v${VERSION}" \
              -f "object=$COMMIT_SHA" \
              -f type=commit \
              --jq '.sha')

            gh api repos/${{ github.repository }}/git/refs \
              -f "ref=refs/tags/v${VERSION}" \
              -f "sha=$TAG_SHA"
          fi

  release:
    needs: [check, commit-and-tag]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.check.result == 'success' &&
      (needs.commit-and-tag.result == 'success' || needs.commit-and-tag.result == 'skipped') &&
      needs.check.outputs.release_exists == 'false'
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check.outputs.target_version }}"
          gh release create "v${VERSION}" \
            --repo "${{ github.repository }}" \
            --title "v${VERSION}" \
            --notes "Update claude-code to v${VERSION}"

  docker:
    needs: [check, commit-and-tag]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.check.result == 'success' &&
      (needs.commit-and-tag.result == 'success' || needs.commit-and-tag.result == 'skipped') &&
      needs.check.outputs.image_exists == 'false'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ghcr.io/${{ github.repository }}:v${{ needs.check.outputs.target_version }}
            ghcr.io/${{ github.repository }}:latest
